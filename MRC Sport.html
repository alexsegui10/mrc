<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRC Sport — Taller Mecánico Ontinyent</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

/* ── BASE TOKENS ── */
:root{
  --bg:#080808;--bg2:#111;--bg3:#1a1a1a;
  --text:#ffffff;--muted:#888;
  --accent:#D0002A;--accent2:#a80020;
  --border:rgba(255,255,255,0.07);
  --card:#141414;--nav:rgba(8,8,8,0.96);
  --radius:0px;--hw:900;
}
/* ── VARIANT B: TECHNICAL ── */
[data-v="technical"]{
  --bg:#0b0e14;--bg2:#0f1318;--bg3:#141820;
  --text:#dde2ea;--muted:#6a7585;
  --border:rgba(70,110,180,0.12);--card:#0f1318;
  --radius:2px;--hw:800;
}
/* ── VARIANT C: PREMIUM ── */
[data-v="premium"]{
  --bg:#0d0d0d;--bg2:#181818;--bg3:#1e1e1e;
  --text:#f0ede8;--muted:#6e6b66;
  --border:rgba(255,255,255,0.06);--card:#161616;
  --radius:1px;--hw:800;
}
/* ── VARIANT D: MINIMAL ── */
[data-v="minimal"]{
  --bg:#f7f6f3;--bg2:#ffffff;--bg3:#edecea;
  --text:#111111;--muted:#666;
  --accent:#C8001E;--accent2:#9e0018;
  --border:rgba(0,0,0,0.08);--card:#ffffff;
  --nav:rgba(247,246,243,0.96);--radius:2px;--hw:900;
}

body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;line-height:1.6;transition:background .3s,color .3s}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;font-weight:var(--hw,900);line-height:1.05;text-transform:uppercase;letter-spacing:.01em}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent)}

/* ── LOGO ── */
.logo-box{background:transparent!important;padding:0!important;overflow:visible!important;height:auto!important;display:inline-flex!important;align-items:center}
.logo-box img{height:40px!important;width:auto!important;margin-top:0!important;filter:invert(1) hue-rotate(180deg);display:block}
[data-v="minimal"] .logo-box img{filter:none}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:68px;display:flex;align-items:center}
.nav-in{max-width:1240px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;width:100%}
.logo-box{background:white;padding:3px 10px;display:inline-flex;align-items:center}
.logo-box img{height:34px;width:auto;display:block}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--accent)}
.cta-sm{padding:8px 22px;background:var(--accent);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:background .2s;border-radius:var(--radius)}
.cta-sm:hover{background:var(--accent2)}
@media(max-width:768px){.nav-links{display:none}}

/* ── CONTAINER ── */
.wrap{max-width:1240px;margin:0 auto;padding:0 24px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;background:var(--accent);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:background .2s,transform .15s;border-radius:var(--radius)}
.btn:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-o:hover{border-color:var(--accent);color:var(--accent);background:transparent}

/* ── SECTION LABEL ── */
.lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.lbl::after{content:'';height:1px;width:36px;background:var(--accent)}
.sec-title{font-size:clamp(34px,5vw,62px);color:var(--text);margin-bottom:14px}

/* ── IMG PLACEHOLDER ── */
.img-ph{position:relative;overflow:hidden;background:var(--card)}
.img-ph::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(255,255,255,.025) 18px,rgba(255,255,255,.025) 36px)}
[data-v="minimal"] .img-ph::before{background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(0,0,0,.04) 18px,rgba(0,0,0,.04) 36px)}
.img-ph .ph-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);opacity:.55}

/* services show/hide by viewport */
.svc-desktop{display:block}
.svc-mobile{display:none}
@media(max-width:900px){
  .svc-desktop .wrap>div[style]{grid-template-columns:repeat(2,1fr)!important}
}
/* ── SERVICE GRID ── */
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
@media(max-width:1100px){.svc-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){#servicios .wrap>div[style]{grid-template-columns:repeat(2,1fr)!important}}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  section{padding:56px 0}
  .wrap{padding:0 16px}
  .nav-links{display:none}
  /* hero motorsport */
  .ms-photo-side{position:absolute!important;top:68px!important;left:0!important;right:0!important;bottom:0!important;width:100%!important;clip-path:none!important;opacity:.18!important}
  .ms-photo-side img{width:100%!important;height:100%!important;object-fit:cover!important}
  .ms-left-stripe,.ms-diagonal{display:none!important}
  .ms-content{max-width:100%!important;padding-bottom:130px!important}
  .ms-content h1{font-size:clamp(48px,14vw,72px)!important}
  .ms-btns{flex-direction:column!important;gap:10px!important;align-items:stretch!important}
  .ms-btns a{justify-content:center!important}
  .ms-stats .s-num{font-size:24px!important}
  .ms-stats .s-lbl{font-size:9px!important}
  /* hero technical */
  .tech-hero-grid{grid-template-columns:1fr!important;gap:32px!important}
  .tech-right-panel{display:none!important}
  /* hero minimal */
  .min-hero-grid{grid-template-columns:1fr!important}
  .min-hero-photo{display:none!important}
  /* hero premium */
  .prem-hero-btns{flex-direction:column!important;align-items:stretch!important}
  .prem-hero-btns a{justify-content:center!important}
  .prem-stats{flex-wrap:wrap!important;gap:24px!important;justify-content:center!important;margin-top:40px!important}
  /* marquee label */
  .mq-label{display:none!important}
  /* before/after now works on mobile */
  /* services: hide desktop grid, show compact list */
  .svc-desktop{display:none!important}
  .svc-mobile{display:block!important}
  /* hide heavy sections on mobile */
  .sec-porq{display:none!important}
  .sec-proceso{display:none!important}
  /* new services grid mobile */
  #servicios .wrap>div[style]{grid-template-columns:1fr 1fr!important}
  #servicios .wrap>div>div{padding:24px 18px!important}
  .svc-desc{display:none!important}
  .svc-card h3{font-size:16px!important;margin-bottom:6px!important}
  .svc-cta{display:none!important}
  /* pillars */
  .pillars{grid-template-columns:1fr 1fr!important}
  .pillar{padding:24px 16px!important}
  .p-num{font-size:48px!important}
  /* prices */
  .price-grid{grid-template-columns:repeat(2,1fr)!important}
  .p-amt{font-size:36px!important}
  /* process */
  .proc-main{grid-template-columns:1fr!important;height:auto!important}
  .proc-side{display:none!important}
  .proc-main-img{height:240px!important}
  .proc-bottom{grid-template-columns:1fr 1fr!important;height:auto!important}
  .proc-bottom>*{height:140px!important}
  /* before/after */
  .ba-nameplate{display:none!important}
  /* testimonials */
  .testi-grid{grid-template-columns:1fr!important}
  /* faq */
  .faq-two-col{grid-template-columns:1fr!important}
  .faq-intro{margin-bottom:28px}
  /* footer compact on mobile */
  .footer-grid{grid-template-columns:1fr!important;gap:0!important}
  .footer-col-svc{display:none!important}
  .footer-col-contact{display:none!important}
  .footer-col-brand{padding-bottom:20px!important}
  .footer-bottom{flex-direction:column!important;gap:12px!important;text-align:center!important}
  /* variant switcher */
  .var-sw{left:8px!important;right:8px!important;transform:none!important;bottom:14px!important;overflow-x:auto!important;border-radius:12px!important;gap:3px!important;padding:6px 8px!important;justify-content:flex-start!important;scrollbar-width:none}
  .var-sw::-webkit-scrollbar{display:none}
  .var-sw button{padding:6px 11px!important;font-size:11px!important;white-space:nowrap!important;border-radius:20px!important}
  .var-sw>span{display:none!important}
  /* wa fab */
  .wa-fab{bottom:72px!important}
}
@media(max-width:640px){
  .ba-section .wrap>div{grid-template-columns:1fr!important;gap:0!important}
  .ba-section .wrap>div>div:nth-child(2){flex-direction:row!important;padding:12px 0!important;height:auto!important}
  .ba-section .wrap>div>div:nth-child(2)>div:first-child,
  .ba-section .wrap>div>div:nth-child(2)>div:last-child{display:none!important}
  /* flecha apunta hacia abajo en móvil */
  .ba-arrow{transform:rotate(90deg)!important}
}
@media(max-width:480px){
  .pillars{grid-template-columns:1fr!important}
  .proc-bottom{grid-template-columns:1fr!important}
  .proc-bottom>*{height:140px!important}
  .price-grid{grid-template-columns:1fr 1fr!important}
}
.svc-card{background:var(--card);border:none;border-top:2px solid var(--accent);padding:28px 24px;position:relative;overflow:hidden;cursor:default;transition:background .2s}
.svc-card:hover{background:var(--bg2)}
.svc-ico{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:.18em;color:var(--accent);margin-bottom:12px}
/* ── BEFORE/AFTER ── */
.ba-wrap{position:relative;overflow:hidden;cursor:ew-resize;user-select:none;border-radius:var(--radius)}
.ba-lbl{position:absolute;top:16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;padding:4px 14px;z-index:10;text-transform:uppercase}
.ba-handle{position:absolute;top:0;bottom:0;width:3px;background:var(--accent);z-index:9;transform:translateX(-50%)}
.ba-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 14px rgba(0,0,0,.5)}

/* ── PILLARS ── */
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.pillar{background:var(--card);padding:40px 32px;text-align:center}
.p-num{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;color:var(--accent);opacity:.12;line-height:1;margin-bottom:-16px;display:block}
@media(max-width:900px){.pillars{grid-template-columns:repeat(2,1fr)}}

/* ── PRICES ── */
.price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1px;background:var(--border)}
.price-cell{background:var(--card);padding:28px 20px;text-align:center}
.p-from{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.p-amt{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;color:var(--accent);line-height:1}
.p-unit{font-size:22px;color:var(--muted)}
.p-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text);margin-top:8px}

/* ── GALLERY ── */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:260px 200px;gap:4px}
.gallery>*:first-child{grid-column:span 2}
@media(max-width:700px){.gallery{grid-template-columns:1fr 1fr;grid-template-rows:auto}.gallery>*{height:160px}.gallery>*:first-child{grid-column:span 2;height:200px}}

/* ── TESTIMONIALS ── */
.testi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:22px}
.testi{background:var(--card);border:1px solid var(--border);padding:30px;position:relative;border-radius:var(--radius)}
.testi::before{content:'"';position:absolute;top:12px;right:20px;font-size:72px;font-family:'Barlow Condensed',sans-serif;font-weight:900;color:var(--accent);opacity:.12;line-height:1}
.stars{color:var(--accent);font-size:13px;margin-bottom:10px}

/* ── FAQ ── */
.faq-item{border-bottom:1px solid var(--border)}
.faq-q{padding:20px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--text);transition:color .2s;letter-spacing:.02em;text-transform:uppercase}
.faq-q:hover{color:var(--accent)}
.faq-a{color:var(--muted);line-height:1.75;padding-bottom:20px;font-size:15px}

/* ── CONTACT ── */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start}
@media(max-width:768px){.contact-grid{grid-template-columns:1fr}}
.info-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:26px}
.info-ico{width:42px;height:42px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:#fff;flex-shrink:0;border-radius:var(--radius)}
.form-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block}
.form-inp{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:12px 15px;font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .2s;border-radius:var(--radius)}
.form-inp:focus{border-color:var(--accent)}
.form-inp::placeholder{color:var(--muted)}
textarea.form-inp{resize:vertical;min-height:110px}

/* ── MAP ── */
.map-frame{width:100%;height:100%;border:none;filter:grayscale(100%) invert(1) contrast(.82)}
[data-v="minimal"] .map-frame{filter:grayscale(60%) contrast(.9)}

/* ── URGENCIAS ── */
.urg{background:var(--accent);padding:15px 0}
.urg-in{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}

/* ── FOOTER ── */
.footer{background:var(--bg);border-top:1px solid var(--border);padding:48px 0 28px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:48px;margin-bottom:40px}
@media(max-width:700px){.footer-grid{grid-template-columns:1fr;gap:28px}}

/* ── WA FAB ── */
.wa-fab{position:fixed;bottom:26px;right:26px;z-index:200;width:58px;height:58px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 18px rgba(37,211,102,.45);transition:transform .2s,box-shadow .2s}
.wa-fab:hover{transform:scale(1.1);box-shadow:0 6px 26px rgba(37,211,102,.55)}

/* ── TWEAKS ── */
.tw-panel{position:fixed;bottom:96px;right:26px;z-index:199;background:var(--bg2);border:1px solid var(--border);padding:20px;width:230px;box-shadow:0 8px 36px rgba(0,0,0,.55)}
.tw-h{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.tw-h::before{content:'';width:3px;height:14px;background:var(--accent)}
.tw-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block}
.tw-btn{display:block;width:100%;padding:8px 11px;margin-bottom:4px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.05em;text-align:left;cursor:pointer;transition:all .2s;border-radius:var(--radius)}
.tw-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(208,0,42,.07)}
.tw-btn:hover:not(.on){border-color:var(--border);color:var(--text)}
.tw-div{height:1px;background:var(--border);margin:14px 0}

/* ── SECTION SPACING ── */
section{padding:96px 0}

/* ── VARIANT HERO SPECIFICS ── */
/* Technical grid bg */
[data-v="technical"] .tech-grid-bg{display:block}
.tech-grid-bg{display:none}

/* Premium radial */
[data-v="premium"] .prem-radial{display:block}
.prem-radial{display:none}

/* Minimal section title underline */
[data-v="minimal"] .sec-title::after{content:'';display:block;width:44px;height:3px;background:var(--accent);margin-top:10px}

/* Red vertical stripe motorsport */
[data-v="motorsport"] .ms-stripe{display:block}
.ms-stripe{display:none}
</style>
</head>

    {name:'Audi',       src:SI('audi'),          t:'si'},
    {name:'Porsche',    src:SI('porsche'),       t:'si'},
    {name:'Toyota',     src:SI('toyota'),        t:'si'},
    {name:'Honda',      src:SI('honda'),         t:'si'},
    {name:'Ford',       src:SI('ford'),          t:'si'},
    {name:'Renault',    src:SI('renault'),       t:'si'},
    {name:'Volvo',      src:SI('volvo'),         t:'si'},
    {name:'Hyundai',    src:SI('hyundai'),       t:'si'},
    {name:'Kia',        src:SI('kia'),           t:'si'},
    {name:'Fiat',       src:SI('fiat'),          t:'si'},
    {name:'Mercedes',   src:GH('mercedes-benz'), t:'gh'},
    {name:'Alfa Romeo', src:GH('alfa-romeo'),    t:'gh'},
    {name:'SEAT',       src:GH('seat'),          t:'gh'},
    {name:'Peugeot',    src:GH('peugeot'),       t:'gh'},
    {name:'Citroën',    src:GH('citroen'),       t:'gh'},
    {name:'Opel',       src:GH('opel'),          t:'gh'},
    {name:'Nissan',     src:GH('nissan'),        t:'gh'},
    {name:'Mazda',      src:GH('mazda'),         t:'gh'},
    {name:'Chevrolet',  src:GH('chevrolet'),     t:'gh'},
    {name:'Jeep',       src:GH('jeep'),          t:'gh'},
    {name:'Skoda',      src:GH('skoda'),         t:'gh'},
    {name:'Dacia',      src:GH('dacia'),         t:'gh'},
  ];
  const all=[...brands,...brands];

  /* CSS background-image: fallos 100% silenciosos, sin errores en consola */
  const LogoItem=({b})=>{
    const hover=e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.transform='scale(1.08)'};
    const leave=e=>{e.currentTarget.style.opacity='.52';e.currentTarget.style.transform='scale(1)'};
    return(

        style={{width:'76px',height:'34px',flexShrink:0,
          backgroundImage:`url('${b.src}')`,backgroundSize:'contain',
          backgroundRepeat:'no-repeat',backgroundPosition:'center',
          filter:'brightness(0) invert(1)',
          opacity:.52,transition:'opacity .25s,transform .25s'}}/>
    );
  };

  return(
    <div style={{overflow:'hidden',position:'relative',background:'#0c0c0c',
      borderTop:'1px solid rgba(255,255,255,0.06)',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>

        display:'flex',alignItems:'center',gap:'14px',
        padding:'0 16px 0 20px',
        background:'linear-gradient(to right,#0c0c0c 78%,transparent)'}}>
        <div>
          <div style={{fontFamily:'Barlow Condensed',fontSize:'10px',fontWeight:700,

      <div style={{display:'flex',alignItems:'center',width:'max-content',
        animation:'mq 70s linear infinite',paddingLeft:'190px'}}>
        {all.map((b,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',padding:'18px 26px'}}>

                    <a href={WA} target="_blank" style={{color:'var(--accent)',fontSize:'13px',fontWeight:600,textDecoration:'none'}}>escríbenos por WhatsApp</a>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* FOOTER */}
    <footer className="footer">
      <div className="wrap">
        <div className="footer-grid">
          <div className="footer-col-brand">
            <div className="logo-box" style={{marginBottom:'16px',display:'inline-flex'}}>
              <img src="uploads/logo-mrc-simple.png" alt="MRC Sport" style={{height:'34px'}}/>
            </div>
            <p style={{color:'var(--muted)',fontSize:'15px',lineHeight:1.7,maxWidth:'280px'}}>
              Tu taller de confianza en Ontinyent. Mecánica, carrocería, neumáticos y preparación deportiva desde 2010.
            </p>
          </div>
          <div className="footer-col-svc">
            <div style={{fontFamily:'Barlow Condensed',fontSize:'15px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:'14px',color:'var(--text)'}}>Servicios</div>
            {['Mecánica General','Cambio de Aceite','Neumáticos','Revisión Pre-ITV','Carrocería','Tuning & Preparación'].map(s=>(
              <div key={s} style={{color:'var(--muted)',fontSize:'14px',marginBottom:'7px'}}>{s}</div>
            ))}
          </div>
          <div className="footer-col-contact">
            <div style={{fontFamily:'Barlow Condensed',fontSize:'15px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:'14px',color:'var(--text)'}}>Contacto</div>
            <div style={{color:'var(--muted)',fontSize:'14px',lineHeight:2}}>
              <div>Avda. Textil, 51-A</div>
              <div>46870 Ontinyent (Valencia)</div>
              <div><a href={TEL} style={{color:'var(--accent)',textDecoration:'none',fontWeight:600}}>96 291 64 96</a></div>
              <div><a href="tel:+34678732866" style={{color:'var(--muted)',textDecoration:'none'}}>678 732 866</a></div>
              <div><a href="mailto:mrc@mrck.es" style={{color:'var(--muted)',textDecoration:'none'}}>mrc@mrck.es</a></div>
            </div>
          </div>
        </div>
        <div className="footer-bottom" style={{borderTop:'1px solid var(--border)',paddingTop:'22px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'14px'}}>
          <div style={{color:'var(--muted)',fontSize:'13px'}}>© 2025 MRC Sport. Todos los derechos reservados.</div>
          <a href={WA} target="_blank" className="btn" style={{fontSize:'15px',padding:'10px 22px'}}><WaIcon/>WhatsApp</a>
        </div>
      </div>
    </footer>

    {/* WA FAB */}
    <a href={WA} target="_blank" className="wa-fab" title="Contactar por WhatsApp">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    {/* VARIANT SWITCHER — always visible */}
    <div className="var-sw" style={{
      position:'fixed',bottom:'26px',left:'50%',transform:'translateX(-50%)',
      zIndex:300,display:'flex',alignItems:'center',gap:'6px',
      background:'rgba(10,10,10,0.92)',border:'1px solid rgba(255,255,255,0.12)',
      backdropFilter:'blur(14px)',padding:'8px 10px',borderRadius:'40px',
      boxShadow:'0 4px 24px rgba(0,0,0,0.6)'
    }}>
      <span style={{fontFamily:'Barlow Condensed',fontSize:'11px',fontWeight:700,letterSpacing:'.18em',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',paddingRight:'6px',paddingLeft:'4px',whiteSpace:'nowrap'}}>Variante</span>
      {VARIANTS.map(v=>(
        <button key={v.id} onClick={()=>set('variant',v.id)} style={{
          padding:'7px 16px',borderRadius:'30px',border:'none',cursor:'pointer',
          fontFamily:'Barlow Condensed',fontSize:'14px',fontWeight:700,letterSpacing:'.06em',
          textTransform:'uppercase',transition:'all .2s',whiteSpace:'nowrap',
          background: tw.variant===v.id ? 'var(--accent)' : 'rgba(255,255,255,0.06)',
          color: tw.variant===v.id ? '#fff' : 'rgba(255,255,255,0.5)',
        }}>{v.lbl}</button>
      ))}
    </div>

    {/* TWEAKS */}
    {twVis&&(
      <div className="tw-panel">
        <div className="tw-h">Tweaks</div>
        <span className="tw-lbl">Variante de diseño</span>
        {VARIANTS.map(v=>(
          <button key={v.id} className={`tw-btn ${tw.variant===v.id?'on':''}`} onClick={()=>set('variant',v.id)}>{v.lbl}</button>
        ))}
        <div className="tw-div"/>
        <span className="tw-lbl">Sección de precios</span>
        <button className={`tw-btn ${tw.showPrices?'on':''}`} onClick={()=>set('showPrices',!tw.showPrices)}>
          {tw.showPrices?'✓ Visible':'Oculta'}
        </button>
      </div>
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
